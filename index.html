<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduFreeHub - Login</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3a0ca3;
            --accent: #4cc9f0;
            --success: #06d6a0;
            --danger: #ef476f;
            --dark: #1b263b;
            --light: #f8f9fa;
            --text: #2b2d42;
            --gradient: linear-gradient(135deg, #4361ee, #3a0ca3);
            --border-radius: 12px;
            --box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Custom cursor */
        .cursor {
            width: 20px;
            height: 20px;
            border: 1px solid var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: difference;
            transition: transform 0.2s ease;
        }

        .cursor-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            mix-blend-mode: difference;
        }

        *, a, button { cursor: none !important; }

        /* Canvas background */
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: 0;
        }

        /* Intro animation */
        .intro {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -60%);
            text-align: center;
            z-index: 10;
            opacity: 0;
            animation: fadeEffect 2.5s ease-in forwards;
        }

        .intro .logo-text {
            font-size: 2.8rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        .intro .logo-text span {
            color: var(--accent);
            -webkit-text-fill-color: var(--accent);
        }

        .intro p {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
            margin-top: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @keyframes fadeEffect {
            0% { opacity: 0; transform: translate(-50%, -55%); }
            40% { opacity: 1; transform: translate(-50%, -60%); }
            80% { opacity: 1; }
            100% { opacity: 0; }
        }

        .intro.hidden { display: none; }

        /* Login container */
        .login-container {
            position: relative;
            z-index: 10;
            width: 380px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateY(30px);
        }

        .login-container.show {
            animation: slideUp 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Brand header inside card */
        .brand {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .brand h1 {
            font-size: 1.6rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .brand h1 span {
            color: var(--accent);
            -webkit-text-fill-color: var(--accent);
        }

        .brand p {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Demo badge */
        .demo-badge {
            display: inline-block;
            background: rgba(76, 201, 240, 0.15);
            border: 1px solid rgba(76, 201, 240, 0.3);
            color: var(--accent);
            font-size: 0.7rem;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 6px;
        }

        /* Forms */
        .login-form, .signup-form {
            display: flex;
            flex-direction: column;
        }

        .signup-form { display: none; }

        .login-form h2, .signup-form h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: white;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        label {
            font-size: 0.82rem;
            color: rgba(255,255,255,0.6);
            margin-bottom: 5px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            background: rgba(255,255,255,0.07);
            color: white;
            font-size: 0.92rem;
            outline: none;
            transition: var(--transition);
        }

        input:focus {
            border-color: var(--primary);
            background: rgba(67, 97, 238, 0.1);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }

        input::placeholder { color: rgba(255,255,255,0.3); }

        button[type="submit"] {
            padding: 0.85rem;
            border: none;
            border-radius: 30px;
            background: var(--gradient);
            color: white;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 0.3rem;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(67, 97, 238, 0.45);
        }

        /* Loading spinner on button */
        button[type="submit"].loading {
            pointer-events: none;
            opacity: 0.8;
        }

        button[type="submit"].loading::after {
            content: '';
            display: inline-block;
            width: 14px;
            height: 14px;
            margin-left: 8px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .error-message {
            font-size: 0.82rem;
            color: var(--danger);
            margin-bottom: 0.8rem;
            min-height: 18px;
        }

        .success-message {
            font-size: 0.82rem;
            color: var(--success);
            margin-bottom: 0.8rem;
            min-height: 18px;
        }

        .switch-link {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.5);
        }

        .switch-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .switch-link a:hover { color: var(--primary); }

        /* Hint box */
        .hint-box {
            background: rgba(76, 201, 240, 0.08);
            border: 1px solid rgba(76, 201, 240, 0.2);
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            margin-bottom: 1rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
            line-height: 1.6;
        }

        .hint-box strong { color: var(--accent); }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 1rem 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.1);
        }

        .divider span {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-dot"></div>
    <div id="canvas-container"></div>

    <div class="intro" id="intro">
        <div class="logo-text">EduFree<span>Hub</span></div>
        <p>Learn freely. Grow endlessly.</p>
    </div>

    <div class="login-container" id="loginContainer">
        <div class="brand">
            <h1>EduFree<span>Hub</span></h1>
            <p>Free Educational Resources</p>
            <span class="demo-badge">✦ Demo Mode</span>
        </div>

        <!-- LOGIN FORM -->
        <form class="login-form" id="loginForm">
            <h2>Welcome back 👋</h2>

            <!-- Demo hint -->
            <div class="hint-box">
                🔑 Demo credentials:<br>
                <strong>Email:</strong> demo@edufreehub.com &nbsp;|&nbsp; <strong>Password:</strong> Demo@1234
            </div>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>

            <p id="login-error" class="error-message"></p>

            <button type="submit" id="loginBtn">Login</button>

            <div class="divider"><span>or</span></div>

            <p class="switch-link">Don't have an account? <a href="#" onclick="showSignUp(); return false;">Sign Up</a></p>
        </form>

        <!-- SIGNUP FORM -->
        <form class="signup-form" id="signupForm">
            <h2>Create Account ✨</h2>

            <label for="new-username">Username</label>
            <input type="text" id="new-username" name="new-username" placeholder="yourname" required>

            <label for="signup-email">Email</label>
            <input type="email" id="signup-email" name="email" placeholder="you@example.com" required>

            <label for="new-password">Password</label>
            <input type="password" id="new-password" name="new-password" placeholder="Min 8 chars, A-Z, 0-9, @$!%" required>

            <p id="signup-error" class="error-message"></p>
            <p id="signup-success" class="success-message"></p>

            <button type="submit" id="signupBtn">Create Account</button>

            <div class="divider"><span>or</span></div>

            <p class="switch-link">Already have an account? <a href="#" onclick="showLogin(); return false;">Login</a></p>
        </form>
    </div>

    <script>
        // =====================
        // Custom Cursor
        // =====================
        const cursor = document.querySelector('.cursor');
        const cursorDot = document.querySelector('.cursor-dot');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorDot.style.left = e.clientX + 'px';
            cursorDot.style.top = e.clientY + 'px';
        });

        // =====================
        // Canvas Particles
        // =====================
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        document.getElementById('canvas-container').appendChild(canvas);

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = 'rgba(67, 97, 238, 0.5)';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width || this.x < 0) this.speedX = -this.speedX;
                if (this.y > canvas.height || this.y < 0) this.speedY = -this.speedY;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                particles.slice(i).forEach(p2 => {
                    const dx = p.x - p2.x, dy = p.y - p2.y;
                    if (Math.sqrt(dx*dx + dy*dy) < 120) {
                        ctx.beginPath();
                        ctx.strokeStyle = 'rgba(76, 201, 240, 0.12)';
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(animate);
        }
        animate();

        // =====================
        // Intro → Login reveal
        // =====================
        setTimeout(() => {
            document.getElementById('intro').classList.add('hidden');
            document.getElementById('loginContainer').classList.add('show');
        }, 2800);

        // =====================
        // Form Toggles
        // =====================
        function showSignUp() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'flex';
        }
        function showLogin() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'flex';
        }

        // =====================
        // Mock User Store
        // (uses localStorage so signups persist across page refreshes)
        // =====================
        function getUsers() {
            return JSON.parse(localStorage.getItem('edufreehub_users') || '[]');
        }
        function saveUsers(users) {
            localStorage.setItem('edufreehub_users', JSON.stringify(users));
        }

        // Pre-load demo account if not already there
        (function seedDemoUser() {
            const users = getUsers();
            const alreadyExists = users.find(u => u.email === 'demo@edufreehub.com');
            if (!alreadyExists) {
                users.push({
                    username: 'DemoUser',
                    email: 'demo@edufreehub.com',
                    password: 'Demo@1234'
                });
                saveUsers(users);
            }
        })();

        // =====================
        // 🔐 LOGIN — Mock Auth
        // =====================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorEl  = document.getElementById('login-error');
            const btn      = document.getElementById('loginBtn');

            errorEl.innerText = '';
            btn.classList.add('loading');
            btn.innerText = 'Logging in';

            // Simulate network delay (like a real API call)
            setTimeout(() => {
                const users = getUsers();
                const user  = users.find(u => u.email === email && u.password === password);

                if (user) {
                    // Save session
                    sessionStorage.setItem('edufree_user', JSON.stringify({ username: user.username, email: user.email }));
                    // Redirect to main site
                    window.location.href = 'home.html';
                } else {
                    btn.classList.remove('loading');
                    btn.innerText = 'Login';

                    // Give specific error messages
                    const emailExists = users.find(u => u.email === email);
                    if (!emailExists) {
                        errorEl.innerText = '❌ Email not found. Please sign up first.';
                    } else {
                        errorEl.innerText = '❌ Incorrect password. Please try again.';
                    }
                }
            }, 900);
        });

        // =====================
        // 📝 SIGNUP — Mock Auth
        // =====================
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const username   = document.getElementById('new-username').value.trim();
            const email      = document.getElementById('signup-email').value.trim();
            const password   = document.getElementById('new-password').value;
            const errorEl    = document.getElementById('signup-error');
            const successEl  = document.getElementById('signup-success');
            const btn        = document.getElementById('signupBtn');

            errorEl.innerText   = '';
            successEl.innerText = '';

            // Password strength validation
            const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!regex.test(password)) {
                errorEl.innerText = '❌ Password must be 8+ chars with uppercase, lowercase, number & special character.';
                return;
            }

            btn.classList.add('loading');
            btn.innerText = 'Creating account';

            setTimeout(() => {
                const users = getUsers();

                // Check duplicates
                const emailTaken    = users.find(u => u.email === email);
                const usernameTaken = users.find(u => u.username.toLowerCase() === username.toLowerCase());

                if (emailTaken) {
                    btn.classList.remove('loading');
                    btn.innerText = 'Create Account';
                    errorEl.innerText = '❌ Email already registered. Please login.';
                    return;
                }

                if (usernameTaken) {
                    btn.classList.remove('loading');
                    btn.innerText = 'Create Account';
                    errorEl.innerText = '❌ Username already taken. Try another.';
                    return;
                }

                // Save new user
                users.push({ username, email, password });
                saveUsers(users);

                btn.classList.remove('loading');
                btn.innerText = 'Create Account';
                successEl.innerText = '✅ Account created! You can now login.';

                // Auto-switch to login after 1.5s
                setTimeout(() => {
                    successEl.innerText = '';
                    showLogin();
                    // Pre-fill email on login form
                    document.getElementById('email').value = email;
                }, 1500);

            }, 900);
        });
    </script>
</body>
</html>
